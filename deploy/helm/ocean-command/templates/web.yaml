apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocean-command.name" . }}-web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: ocean-command-web }
  template:
    metadata:
      labels: { app: ocean-command-web }
    spec:
      containers:
        - name: web
          image: {{ .Values.image.web | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 3000 }]
          env:
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.config.apiUrl | quote }}
          readinessProbe: { httpGet: { path: /, port: 3000 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /, port: 3000 }, initialDelaySeconds: 10 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ocean-command.name" . }}-web
spec:
  selector: { app: ocean-command-web }
  ports: [{ name: http, port: {{ .Values.service.webPort }}, targetPort: 3000 }]
